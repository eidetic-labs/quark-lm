name: Deploy QuarkLM Marketing

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'sites/marketing/**'
      - 'sites/shared/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/build-marketing.mjs'
      - '.github/workflows/deploy-marketing.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: quarklm-marketing-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run marketing:build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: sites/marketing/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
